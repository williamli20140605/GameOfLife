<!DOCTYPE html>
<html>
<head>
    <title>Conway's Game of Life</title>
    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .controls {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1;
        }
        .button {
            margin: 0 5px;
            padding: 10px 20px;
            cursor: pointer;
            /* Prevent focus outline and user selection */
            outline: none;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        /* Remove focus styles */
        .button:focus {
            outline: none;
            box-shadow: none;
        }
        .stats {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1;
        }
        #populationGraph {
            margin-top: 10px;
            background: #323232;
        }
        .array-input-container textarea {
            display: block;
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
            padding: 5px;
        }
        
        .array-input-container button {
            width: 100%;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
        <button id="startButton" class="button">Start</button>
        <button id="clearButton" class="button">Reset</button>
        <button id="randomButton" class="button">Random</button>
        <button id="exportButton" class="button">Export</button>
        <button id="importButton" class="button">Import</button>
        <button id="gpuButton" class="button">GPU: On</button>
    </div>
    <input id="importFileInput" type="file" accept="application/json,.json,.rle,.mc,text/plain" style="display: none;">
    <div class="stats">
        <div id="cameraInfo"></div>
        <div id="statsInfo"></div>
        <canvas id="populationGraph" width="200" height="100"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
